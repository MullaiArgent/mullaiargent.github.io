    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');

    const blobUrls = {};

      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();

          const blob = new Blob([finalBytes], { type: entry.mime });

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};

    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);

    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

    // which fired before we swapped the document. Trigger manually if present.

amily:inherit;font-size:14px;font-weight:700;border-radius:9px;cursor:pointer\">Contact sales<\u002Fbutton><\u002Fsc-raw-td>\n        <\u002Fsc-raw-tr>\n      <\u002Fsc-raw-tbody>\n    <\u002Fsc-raw-table>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"guarantee\" style=\"background:#19191c;border-radius:20px;padding:48px 56px;margin:32px 0 72px;display:flex;align-items:center;gap:48px;color:#fff\">\n    <div style=\"flex:none;width:64px;height:64px;border-radius:16px;background:rgba(230,179,37,.15);display:flex;align-items:center;justify-content:center;font-size:30px\">🛡️<\u002Fdiv>\n    <div style=\"flex:1\">\n      <h3 style=\"font-size:24px;font-weight:800;margin:0 0 8px;letter-spacing:-0.01em\">You're protected by our 30-day money-back guarantee<\u002Fh3>\n      <p style=\"font-size:15px;color:#b5b5bb;line-height:1.55;margin:0\">Every Rasidhu POS plan includes free updates, secure daily cloud backup, and real human support — no setup fees, no lock-in contracts. Not happy in the first 30 days? We'll refund you in full.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"gstats\" style=\"flex:none;display:flex;gap:40px;text-align:center\">\n      <div><div style=\"font-size:28px;font-weight:800;color:#f5c542\">10k+<\u002Fdiv><div style=\"font-size:12px;color:#b5b5bb;font-weight:600\">Shops running<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-size:28px;font-weight:800;color:#f5c542\">99.9%<\u002Fdiv><div style=\"font-size:12px;color:#b5b5bb;font-weight:600\">Uptime<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-size:28px;font-weight:800;color:#f5c542\">24/7<\u002Fdiv><div style=\"font-size:12px;color:#b5b5bb;font-weight:600\">Support<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer class=\"ftr\" style=\"border-top:1px solid #ececef;padding:28px 0 48px;display:flex;align-items:center;justify-content:space-between;font-size:13px;color:#8a8a90\">\n    <div style=\"display:flex;align-items:center;gap:9px\">\n      <img src=\"b98f1692-60e7-4316-a661-3125d359d890\" alt=\"\" style=\"width:22px;height:22px;object-fit:contain;opacity:.8\">\n      <span style=\"font-weight:700;color:#4a4a50\">Rasidhu POS<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:24px;font-weight:600\">\n      <a href=\"#\">Terms<\u002Fa><a href=\"#\">Privacy<\u002Fa><a href=\"#\">Refund policy<\u002Fa><a href=\"#\">Contact<\u002Fa>\n    <\u002Fdiv>\n    <span>© 2026 Rasidhu. All rights reserved.<\u002Fspan>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { segment: 'smb' };\n\n  selectSeg = (seg) => { if (seg !== this.state.segment) this.setState({ segment: seg }); };\n\n  componentDidMount() {\n    const glow = document.getElementById('rp-glow');\n    const cursor = document.getElementById('rp-cursor');\n    const sparkles = document.getElementById('rp-sparkles');\n    const blobs = Array.prototype.slice.call(document.querySelectorAll('.rp-blob'));\n    const st = { mx: 0, my: 0, sy: 0, raf: 0 };\n    const apply = () => {\n      st.raf = 0;\n      const mx = st.mx, my = st.my, sy = st.sy;\n      if (glow) glow.style.transform = 'translate(' + (mx * 34) + 'px,' + (my * 26 + sy * 0.06) + 'px)';\n      if (sparkles) sparkles.style.transform = 'translate(' + (mx * 12) + 'px,' + (my * 10 + sy * 0.03) + 'px)';\n      blobs.forEach(function (b) {\n        const sp = parseFloat(b.getAttribute('data-speed')) || 4;\n        b.style.transform = 'translate(' + (mx * sp * 3) + 'px,' + (my * sp * 3 + sy * sp * 0.015) + 'px)';\n      });\n    };\n    const req = () => { if (!st.raf) st.raf = requestAnimationFrame(apply); };\n    this._onMove = function (e) {\n      st.mx = (e.clientX / window.innerWidth - 0.5) * 2;\n      st.my = (e.clientY / window.innerHeight - 0.5) * 2;\n      if (cursor) {\n        cursor.style.opacity = '1';\n        cursor.style.transform = 'translate(' + e.clientX + 'px,' + e.clientY + 'px) translate(-50%,-50%)';\n      }\n      req();\n    };\n    this._onScroll = function () {\n      st.sy = window.scrollY || document.documentElement.scrollTop || 0;\n      req();\n    };\n    window.addEventListener('mousemove', this._onMove, { passive: true });\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    apply();\n\n    this._rm = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    const cardsWrap = document.querySelector('.cards');\n    if (cardsWrap && !this._rm) {\n      const resetCard = (c) => { c.style.transition = 'transform .5s ease'; c.style.transform = ''; };\n      this._onCardMove = (e) => {\n        const outer = e.target && e.target.closest ? e.target.closest('.flip-card') : null;\n        const face = e.target && e.target.closest ? e.target.closest('.card-face') : null;\n        if (this._activeCard && this._activeCard !== outer) { resetCard(this._activeCard); this._activeCard = null; }\n        if (this._activeFace && this._activeFace !== face) { const g0 = this._activeFace.querySelector('.card-glare'); if (g0) g0.style.opacity = '0'; this._activeFace = null; }\n        if (!outer) return;\n        this._activeCard = outer;\n        const r = outer.getBoundingClientRect();\n        const nx = (e.clientX - r.left) / r.width - 0.5;\n        const ny = (e.clientY - r.top) / r.height - 0.5;\n        outer.style.transition = 'transform .1s ease-out';\n        outer.style.transform = 'rotateX(' + (-ny * 6).toFixed(2) + 'deg) rotateY(' + (nx * 7).toFixed(2) + 'deg) translateY(-6px)';\n        if (face) {\n          const fr = face.getBoundingClientRect();\n          face.style.setProperty('--gx', ((e.clientX - fr.left) / fr.width * 100).toFixed(1) + '%');\n          face.style.setProperty('--gy', ((e.clientY - fr.top) / fr.height * 100).toFixed(1) + '%');\n          const g = face.querySelector('.card-glare');\n          if (g) g.style.opacity = '1';\n          this._activeFace = face;\n        }\n      };\n      this._onCardLeave = () => {\n        if (this._activeCard) { resetCard(this._activeCard); this._activeCard = null; }\n        if (this._activeFace) { const g = this._activeFace.querySelector('.card-glare'); if (g) g.style.opacity = '0'; this._activeFace = null; }\n      };\n      cardsWrap.addEventListener('mousemove', this._onCardMove, { passive: true });\n      cardsWrap.addEventListener('mouseleave', this._onCardLeave, { passive: true });\n      this._cardsWrap = cardsWrap;\n    }\n  }\n\n  componentWillUnmount() {\n    if (this._onMove) window.removeEventListener('mousemove', this._onMove);\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n    if (this._cardsWrap) {\n      this._cardsWrap.removeEventListener('mousemove', this._onCardMove);\n      this._cardsWrap.removeEventListener('mouseleave', this._onCardLeave);\n    }\n  }\n\n  renderVals() {\n    const seg = this.state.segment;\n    const flipped = seg === 'ent';\n\n    const ctaDark = 'width:100%;padding:14px;border:none;background:#19191c;color:#fff;font-family:inherit;font-size:15px;font-weight:700;border-radius:11px;cursor:pointer';\n    const ctaGold = 'width:100%;padding:14px;border:none;background:linear-gradient(110deg,#e0a412,#f5c542 30%,#fff3c8 48%,#f5c542 66%,#e0a412);background-size:220% 100%;animation:rpShine 6s ease-out infinite;color:#3a2a00;font-family:inherit;font-size:15px;font-weight:800;border-radius:11px;cursor:pointer;box-shadow:0 6px 16px rgba(224,164,18,.3)';\n    const ctaGhost = 'width:100%;padding:14px;border:1px solid #19191c;background:#fff;color:#19191c;font-family:inherit;font-size:15px;font-weight:700;border-radius:11px;cursor:pointer';\n\n    const smb = [\n      { name:'Starter', shops:'Single shop', currency:'₹', price:'1,500', per:'/year', tagline:'For a single counter just getting started with digital billing.',\n        cta:'Buy now', ctaStyle:ctaGhost, popular:false,\n        features:['1 register', 'Billing & GST invoicing', 'Basic inventory management', 'Daily sales report', 'Email support'] },\n      { name:'Growth', shops:'Up to 2 shops', currency:'₹', price:'2,500', per:'/year', tagline:'Everything a growing store needs across two locations.',\n        cta:'Buy now', ctaStyle:ctaGold, popular:true,\n        features:['Up to 3 registers per shop', 'Multi-shop dashboard', 'Staff accounts & permissions', 'Loyalty & customer CRM', 'Priority chat support'] },\n    ];\n\n    const ent = [\n      { name:'Business', shops:'Up to 10 shops', currency:'₹', price:'10,000', per:'/year', tagline:'Centralised control and analytics for multi-outlet retailers.',\n        cta:'Buy now', ctaStyle:ctaGold, popular:true,\n        features:['Unlimited registers', 'Advanced analytics & forecasting', 'Role-based staff access', 'API & payment integrations', 'Dedicated onboarding'] },\n      { name:'Enterprise', shops:'Unlimited shops', currency:'', price:'Custom', per:'', tagline:'Tailored deployment, SLAs and account management at scale.',\n        cta:'Contact sales', ctaStyle:ctaDark, popular:false,\n        features:['Everything in Business', 'Custom integrations', 'Single sign-on (SSO)', '24/7 priority support', 'Dedicated account manager'] },\n    ];\n\n    const cv = 'background:#fff;border-radius:18px;padding:32px 30px;text-align:left;box-sizing:border-box;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden';\n    const cvN = cv + ';border:1px solid #e6e6ea;box-shadow:0 1px 3px rgba(0,0,0,.05)';\n    const cvP = cv + ';border:2px solid #e6b325;box-shadow:0 16px 40px rgba(224,164,18,.2)';\n    const front = (p) => (p.popular ? cvP : cvN) + ';position:relative;z-index:' + (flipped ? 1 : 2) + ';opacity:' + (flipped ? 0 : 1) + ';transition:opacity 0s linear .42s';\n    const back = (p) => (p.popular ? cvP : cvN) + ';position:absolute;inset:0;transform:rotateY(180deg);z-index:' + (flipped ? 2 : 1) + ';opacity:' + (flipped ? 1 : 0) + ';transition:opacity 0s linear .42s';\n\n    const innerStyle = 'position:relative;transform-style:preserve-3d;transition:transform .85s cubic-bezier(.5,.05,.2,1);transform:rotateY(' + (flipped ? 180 : 0) + 'deg)';\n\n    const flipCards = [0, 1].map((i) => ({\n      innerStyle,\n      faces: [\n        { plan: smb[i], faceStyle: front(smb[i]) },\n        { plan: ent[i], faceStyle: back(ent[i]) },\n      ],\n    }));\n\n    const tabActive = 'padding:10px 22px;border:none;border-radius:9px;background:#fff;color:#19191c;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.08)';\n    const tabIdle = 'padding:10px 22px;border:none;border-radius:9px;background:transparent;color:#8a8a90;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer';\n\n    const rowsData = [\n      ['Shops included', '1', 'Up to 2', 'Up to 10', 'Unlimited'],\n      ['Registers per shop', '1', 'Up to 3', 'Unlimited', 'Unlimited'],\n      ['Billing & GST invoicing', '✓', '✓', '✓', '✓'],\n      ['Inventory management', 'Basic', 'Advanced', 'Advanced', 'Advanced'],\n      ['Sales reports & analytics', 'Daily', 'Real-time', 'Advanced', 'Custom'],\n      ['Staff accounts', '—', '✓', 'Role-based', 'Role-based + SSO'],\n      ['Loyalty & customer CRM', '—', '✓', '✓', '✓'],\n      ['Barcode & label printing', '✓', '✓', '✓', '✓'],\n      ['Offline mode', '✓', '✓', '✓', '✓'],\n      ['Payment gateway integrations', '—', '✓', '✓', 'Custom'],\n      ['API access', '—', '—', '✓', '✓'],\n      ['Support', 'Email', 'Priority chat', 'Onboarding', '24/7 + manager'],\n    ];\n    const rows = rowsData.map((r, i) => ({\n      label: r[0], a: r[1], b: r[2], c: r[3], d: r[4],\n      rowStyle: 'border-bottom:1px solid #f0f0f2' + (i % 2 === 1 ? ';background:#fafafb' : ''),\n    }));\n\n    return {\n      flipCards,\n      rows,\n      selectSmb: () => this.selectSeg('smb'),\n      selectEnt: () => this.selectSeg('ent'),\n      smbTabStyle: seg === 'smb' ? tabActive : tabIdle,\n      entTabStyle: seg === 'ent' ? tabActive : tabIdle,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
